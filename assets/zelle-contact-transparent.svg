<svg xmlns="http://www.w3.org/2000/svg" width="920" height="620" viewBox="0 0 920 620" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Zelle reservation contact information</title>
  <desc id="desc">Contact card for Zelle reservation deposits including Cresencio Calderon, Mission Armoed Group, and phone number 626-712-5360.</desc>
  <defs>
    <linearGradient id="zg" x1="60" y1="70" x2="860" y2="550" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="pb" x1="90" y1="420" x2="830" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6D28D9"/>
      <stop offset="1" stop-color="#5B21B6"/>
    </linearGradient>
    <filter id="soft" x="0" y="0" width="920" height="620" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#312E81" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g filter="url(#soft)">
    <rect x="58" y="54" width="804" height="506" rx="30" stroke="url(#zg)" stroke-width="4"/>
    <text x="460" y="112" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800" fill="#5B21B6">Zelle</text>
    <text x="460" y="152" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#312E81">Send $98 Reservation Deposit</text>

    <circle cx="460" cy="220" r="56" fill="#EEF2FF" stroke="#4338CA" stroke-width="2"/>
    <text x="460" y="238" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="700" fill="#1F1B4D">CC</text>

    <rect x="90" y="290" width="740" height="180" rx="20" stroke="#7C3AED" stroke-width="2"/>
    <line x1="90" y1="348" x2="830" y2="348" stroke="#C4B5FD" stroke-width="2"/>
    <line x1="90" y1="410" x2="830" y2="410" stroke="#C4B5FD" stroke-width="2"/>

    <text x="460" y="334" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="700" fill="#1E1B4B">Cresencio Calderon</text>
    <text x="460" y="396" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="600" fill="#312E81">Mission Armoed Group</text>
    <text x="460" y="456" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800" fill="#312E81">626-712-5360</text>

    <rect x="90" y="500" width="740" height="44" rx="20" fill="url(#pb)"/>
    <text x="460" y="529" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF">
      Thank you for your payment. Please notify us after sending.
    </text>
  </g>

  <text x="460" y="598" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="700" fill="#1E1B4B">AlfaOmegaDetox.com</text>
</svg>
